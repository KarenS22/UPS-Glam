# Server Port Configuration
server.port=${PORT:8080}

# Reactive R2DBC Relational Database Configuration
spring.r2dbc.url=${SPRING_DATABASE_URL}
spring.r2dbc.username=${SPRING_DATABASE_USERNAME}
spring.r2dbc.password=${SPRING_DATABASE_PASSWORD}

# Supabase API Integration
supabase.url=${SUPABASE_URL}
supabase.anon-key=${SUPABASE_ANON_KEY}
supabase.service-role-key=${SUPABASE_SERVICE_ROLE_KEY}
supabase.jwt-secret=${SUPABASE_JWT_SECRET}

# PyCUDA Image Processing Microservice
cuda.service.url=${CUDA_SERVICE_URL:http://cuda-service:8000}

# Enable reactive logging for debug and testing
logging.level.org.springframework.web=INFO
logging.level.com.instagram.backend=DEBUG
logging.level.org.springframework.data.r2dbc=INFO
logging.level.org.springframework.security=INFO

# WebFlux file upload and payload buffering limitations (allow up to 100MB)
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB
spring.codec.max-in-memory-size=100MB

